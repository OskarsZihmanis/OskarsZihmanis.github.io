<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Pieeja liegta | Oskars Zihmanis</title>

    <script>
        // Dinamiski aizpilda tehniskos parametrus
        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            document.getElementById('date-time').textContent = now.toLocaleString();
            document.getElementById('client-ip').textContent = window.clientIP || '192.168.0.1';
            document.getElementById('request-id').textContent = Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('forbid-code').textContent = 'HTTP_403_'+Math.floor(Math.random()*9000+1000);
            document.getElementById('hit-status').textContent = 'MISS';
        });
    </script>
</head>
<body>
    <div class="error-container">
        <div class="lock-icon">🔒</div>
        <h1>403</h1>
        <h2>PIEEJA LIEGTA</h2>
        <p>Jums nav nepieciešamo atļauju, lai piekļūtu šim saturam.</p>
        <p>Ja uzskatāt, ka šī ir kļūda, lūdzu, sazinieties ar vietnes administratoru.</p>
        
        <div class="debug-info">
            <div><span class="debug-label">Date:</span> <span id="date-time"></span></div>
            <div><span class="debug-label">Node_info:</span> nginx/1.18.0</div>
            <div><span class="debug-label">Request_id:</span> <span id="request-id"></span></div>
            <div><span class="debug-label">Client_ip:</span> <span id="client-ip"></span></div>
            <div><span class="debug-label">Forbid_code:</span> <span id="forbid-code"></span></div>
            <div><span class="debug-label">Hit-status:</span> <span id="hit-status"></span></div>
        </div>
        
        <a href="/" class="btn">ATGRIEZIES UZ SĀKUMLAPU</a>
    </div>
</body>
</html>
